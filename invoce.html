<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JASJOK Invoice</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
  color:#fff;
}

/* =========================
   TOPBAR
========================= */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:22px 34px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  z-index:999;
  backdrop-filter:blur(10px);
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo img{
  height:34px;
}

.logo span{
  font-weight:700;
  letter-spacing:2px;
  font-size:14px;
}

/* =========================
   BG
========================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-2;
}

.bg img{
  width:100%;
  height:100%;
  object-fit:cover;

  filter:
    grayscale(100%)
    brightness(.25)
    blur(10px);

  transform:scale(1.08);
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  z-index:-1;
}

/* =========================
   CONTAINER
========================= */
.container{
  width:100%;
  max-width:900px;
  margin:auto;
  padding:120px 25px 80px;
}

/* CARD */
.invoice{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:28px;
  overflow:hidden;
  backdrop-filter:blur(10px);
}

/* BANNER */
.banner{
  width:100%;
  height:320px;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:35px;
}

.label{
  color:#777;
  font-size:12px;
  letter-spacing:1px;
  margin-bottom:6px;
}

h1{
  font-size:46px;
  margin-bottom:30px;
  line-height:1;
  letter-spacing:-2px;
}

/* INFO GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:30px;
}

.box{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:20px;
}

.box h3{
  font-size:13px;
  color:#777;
  margin-bottom:10px;
  letter-spacing:1px;
}

.box p{
  font-size:17px;
}

/* PRICE */
.price{
  margin:30px 0;
  padding:24px;
  border-radius:20px;

  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
}

.price span{
  display:block;
  color:#777;
  margin-bottom:8px;
  font-size:13px;
}

.price h2{
  font-size:42px;
}

/* AGREEMENT */
.agreement{
  margin-top:30px;
}

.agreement h3{
  margin-bottom:14px;
  color:#aaa;
}

.agreement p{
  color:#cfcfcf;
  line-height:1.8;
  margin-bottom:14px;
  font-size:14px;
}

/* FOOTER */
.footer{
  margin-top:40px;
  text-align:center;
  color:#666;
  font-size:12px;
  letter-spacing:1px;
}

/* MOBILE */
@media(max-width:800px){

  h1{
    font-size:34px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .banner{
    height:220px;
  }

}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <img src="iaf-logo.png">
    <span>JASJOK</span>
  </div>
</div>

<!-- BG -->
<div class="bg">
  <img id="bg">
</div>

<div class="overlay"></div>

<!-- CONTENT -->
<div class="container" id="app"></div>

<script>
async function loadInvoice(){

  const res = await fetch("data.json");
  const data = await res.json();

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const article = data.find(x => x.id === id);

  const app = document.getElementById("app");
  const bg = document.getElementById("bg");

  // 404
  if(!article){

    app.innerHTML = `
      <div class="invoice">
        <div class="content">
          <h1>404</h1>
          <p>Invoice data not found.</p>
        </div>
      </div>
    `;

    return;
  }

  // BG
  bg.src = article.cover;

  // TITLE
  document.title = "Invoice from IAF Digital Engineering to " + article.author;

  app.innerHTML = `

    <div class="invoice">

      <div class="banner">
        <img src="${article.cover}">
      </div>

      <div class="content">

        <div class="label">
          IAF DIGITAL ENGINEERING
        </div>

        <h1>invoice for | ${article.title}</h1>

        <div class="grid">

          <div class="box">
            <h3>CELIENT</h3>
            <p>${article.author}</p>
          </div>

          <div class="box">
            <h3>DATE</h3>
            <p>${article.date}</p>
          </div>

        </div>

        <div class="price">
          <span>TOTAL PAYMENT</span>
          <h2>${article.harga}</h2>
        </div>

        <div class="agreement">

          <h3>Service Agreement</h3>

          <p>
            By continuing this transaction, the client agrees that
            all digital services provided by IAF Digital Engineering
            are delivered as-is according to the requested order.
          </p>

          <p>
            Completion time may vary depending on workload,
            technical limitations, or revision requests.
            Unauthorized redistribution, resale, or impersonation
            of this service is prohibited.
          </p>

          <p>
            This invoice acts as a lightweight digital proof
            of transaction within the JASJOK system environment.
          </p>

        </div>

      </div>

    </div>

  `;

}

loadInvoice();
</script>

<div class="footer">
  © 2026 IAF Digital Engineering — JASJOK
</div>

</body>
</html>
